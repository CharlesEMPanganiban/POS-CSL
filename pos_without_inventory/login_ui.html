<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login UI</title>
<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to right, #fff9cc, #ffe680);
    display: flex;
    height: 100vh;
}

.container {
    display: flex;
    width: 100%;
    align-items: center;
    justify-content: space-around;
}

.card {
    position: relative;
    right: 20px;
    margin-left: 150px;
    background: white;
    padding: 40px;
    border-radius: 20px;
    width: 300px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.card h2 {
    text-align: center;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ddd;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #ff4d4d;
    color: white;
    font-weight: bold;
    margin-top: 10px;
    cursor: pointer;
}

button:hover {
    background: #e60000;
}

.small {
    text-align: center;
    font-size: 12px;
    margin-top: 10px;
    color: #666;
}

.image {
    position: relative;  /* 🔥 REQUIRED */
    text-align: center;
}

.image img {
    width: 100%;
    height: 100%;
    
    
}

.guide-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    background: white;
    color: #ff4d4d;
    padding: 10px 18px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
    box-shadow: 0 5px 15px rgba(0,0,0,0.15);
    transition: 0.2s;


    z-index: 10;
}

.guide-btn:hover {
    background: #ffe0e0;
}


/* SPEECH BUBBLE */
.speech-bubble {
    position: absolute;
    top: 20%;
    left: 25%;

    z-index: 1;

    max-width: 200px;
    padding: 15px 20px;

    background: white;
    border-radius: 25px;
    border: 2px solid #333;

    font-weight: bold;
    font-size: 13px;
    color: #333;

    text-align: center;

    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* TAIL */
.speech-bubble::after {
    content: "";
    position: absolute;
    bottom: -15px;
    right: 50px;

    width: 0;
    height: 0;

    border-width: 15px 10px 0 10px;
    border-style: solid;
    border-color: white transparent transparent transparent;
}

/* BORDER TAIL */
.speech-bubble::before {
    content: "";
    position: absolute;
    bottom: -18px;
    right: 48px;

    width: 0;
    height: 0;

    border-width: 18px 12px 0 12px;
    border-style: solid;
    border-color: #333 transparent transparent transparent;
}

/* highlight word */
.speech-bubble span {
    color: #ff4d4d;
}

</style>
</head>
<body>

<a href="userguide.html" class="guide-btn">📖 User Guide</a>

<div class="container">
    <div class="card">
        <h2>Log into Franks</h2>
        <input type="text" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
	<input type="password" id="confirmPass" placeholder="Confirm Password" style="display:none;">
        <button id="mainBtn">Login</button>
	<p class="small">
    Don't have an account? <span id="toggleForm" style="color:#ff4d4d; cursor:pointer;">Create one</span>
</p>
    </div>

    <div class="image">

    <!-- SPEECH BUBBLE -->
    <div class="speech-bubble">
        Run your store with <span>CONFIDENCE! </span>.
    </div>

    <img src="frankspic.jpg">

</div>
</div>

<script>
let isRegister = false;

const toggle = document.getElementById("toggleForm");
const button = document.getElementById("mainBtn");
const confirmPass = document.getElementById("confirmPass");

const usernameInput = document.querySelector("input[type='text']");
const passwordInput = document.getElementById("password");

// toggle form
toggle.addEventListener("click", () => {
    isRegister = !isRegister;

    if (isRegister) {
        confirmPass.style.display = "block";
        button.innerText = "Create Account";
        toggle.innerText = "Back to Login";
    } else {
        confirmPass.style.display = "none";
        button.innerText = "Login";
        toggle.innerText = "Create one";
    }
});

// button action
button.addEventListener("click", () => {
    let username = usernameInput.value;
    let password = passwordInput.value;
    let confirm = confirmPass.value;

    if (isRegister) {
        // REGISTER
        if (password !== confirm) {
            alert("Passwords do not match!");
            return;
        }

let users = JSON.parse(localStorage.getItem("users")) || [];

// check if username exists
let exists = users.find(u => u.username === username);

if (exists) {
    alert("Username already exists!");
    return;
}

// add new user
users.push({ 
    username: username, 
    password: password, 
    role: "employee" 
});

// save users
localStorage.setItem("users", JSON.stringify(users));

alert("Account created!");

        // auto switch back to login
        toggle.click();
} 


	else {
        // LOGIN
let users = JSON.parse(localStorage.getItem("users")) || [];

let adminExists = users.find(u => u.username === "admin");

if (!adminExists) {
    users.push({
        username: "admin",
        password: "admin123",
        role: "admin"
    });
    localStorage.setItem("users", JSON.stringify(users));
}

let validUser = users.find(u => 
    u.username === username && u.password === password
);

if (validUser) {

    localStorage.setItem("currentUser", username);
    localStorage.setItem("role", validUser.role);

    let logs = JSON.parse(localStorage.getItem("logs")) || [];

    if (validUser.role !== "admin") {
        let alreadyLoggedIn = logs.find(log => 
            log.username === username && !log.timeOut
        );

        if (!alreadyLoggedIn) {
            logs.push({
                username: username,
                date: new Date().toLocaleDateString(),
                timeIn: new Date().toLocaleTimeString(),
                timeOut: null
            });
        }

        localStorage.setItem("logs", JSON.stringify(logs));
    }

    let msg = document.createElement("div");
    msg.innerText = "Login Successful!";
    msg.style.position = "fixed";
    msg.style.top = "20px";
    msg.style.left = "50%";
    msg.style.transform = "translateX(-50%)";
    msg.style.background = "#4CAF50";
    msg.style.color = "white";
    msg.style.padding = "10px 20px";
    msg.style.borderRadius = "10px";
    msg.style.zIndex = "999";

    document.body.appendChild(msg);

    setTimeout(() => {
        window.location.href = "dashboard.html";
    }, 1500);

} else {
    alert("Invalid Username or Password");
}
    }
});
</script>

</body>
</html>
